name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Check wordset conflicts
        run: yarn check-conflicts
        continue-on-error: true

      - name: Check for outdated packages
        run: |
          OUTDATED=$(yarn outdated --json 2>/dev/null | node -e "
            const chunks = []; process.stdin.on('data', d => chunks.push(d)); process.stdin.on('end', () => {
              const lines = Buffer.concat(chunks).toString().trim().split('\n');
              for (const line of lines) {
                try {
                  const obj = JSON.parse(line);
                  if (obj.type === 'table') {
                    const rows = obj.data.body;
                    if (rows.length === 0) { process.stdout.write('none'); return; }
                    const list = rows.map(r => \`\${r[0]} (\${r[1]} -> \${r[3]})\`).join(', ');
                    process.stdout.write(\`\${rows.length}|\${list}\`);
                    return;
                  }
                } catch {}
              }
              process.stdout.write('none');
            });
          " || echo "none")
          if [ "$OUTDATED" != "none" ] && [ -n "$OUTDATED" ]; then
            COUNT=$(echo "$OUTDATED" | cut -d'|' -f1)
            LIST=$(echo "$OUTDATED" | cut -d'|' -f2-)
            echo "::warning::$COUNT outdated package(s): $LIST"
          fi
        continue-on-error: true

      - name: Audit dependencies
        run: |
          AUDIT_OUT=$(yarn audit --json 2>/dev/null | node -e "
            const chunks = []; process.stdin.on('data', d => chunks.push(d)); process.stdin.on('end', () => {
              const lines = Buffer.concat(chunks).toString().trim().split('\n');
              let total = 0; const items = []; const seen = new Set();
              for (const line of lines) {
                try {
                  const obj = JSON.parse(line);
                  if (obj.type === 'auditAdvisory') {
                    const adv = obj.data.advisory;
                    if (!seen.has(adv.id)) {
                      seen.add(adv.id);
                      total++;
                      items.push(\`\${adv.module_name} (\${adv.severity})\`);
                    }
                  }
                } catch {}
              }
              if (total === 0) process.stdout.write('none');
              else process.stdout.write(\`\${total}|\${items.join(', ')}\`);
            });
          " || echo "none")
          if [ "$AUDIT_OUT" != "none" ] && [ -n "$AUDIT_OUT" ]; then
            COUNT=$(echo "$AUDIT_OUT" | cut -d'|' -f1)
            LIST=$(echo "$AUDIT_OUT" | cut -d'|' -f2-)
            echo "::warning::$COUNT audit vulnerability/vulnerabilities found: $LIST"
          fi
        continue-on-error: true

      - name: Run tests
        run: yarn test --run

      - run: yarn build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - id: deployment
        uses: actions/deploy-pages@v4
